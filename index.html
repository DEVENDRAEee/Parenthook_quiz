<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Test Your Knowledge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Home Screen -->
    <div id="homeScreen" class="screen active">
        <div class="container">
            <div class="hero-section">
                <h1 class="app-title">🧠 Quiz Master</h1>
                <p class="app-subtitle">Challenge yourself and test your knowledge!</p>
            </div>
            
            <div class="quiz-config">
                <div class="config-card">
                    <label for="categorySelect">Select Category:</label>
                    <select id="categorySelect" class="select-input">
                        <option value="all">All Categories</option>
                        <option value="python">Python</option>
                        <option value="dsa">Data Structures & Algorithms</option>
                        <option value="webdev">Web Development</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                </div>
                
                <div class="config-card">
                    <label for="difficultySelect">Select Difficulty:</label>
                    <select id="difficultySelect" class="select-input">
                        <option value="all">All Levels</option>
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
            </div>
            
            <button id="startQuizBtn" class="btn btn-primary">Start Quiz</button>
        </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quizScreen" class="screen">
        <div class="container">
            <div class="quiz-header">
                <div class="quiz-info">
                    <span id="questionNumber" class="question-counter">Question 1 of 10</span>
                    <span id="timer" class="timer">⏱️ 00:00</span>
                </div>
                <button id="darkModeToggle" class="dark-mode-btn" aria-label="Toggle dark mode">🌙</button>
            </div>
            
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            
            <div class="question-card">
                <h2 id="questionText" class="question-text">Loading question...</h2>
                
                <div id="optionsContainer" class="options-container">
                    <!-- Options will be dynamically generated -->
                </div>
            </div>
            
            <div class="quiz-navigation">
                <button id="prevBtn" class="btn btn-secondary" disabled>← Previous</button>
                <button id="nextBtn" class="btn btn-primary">Next →</button>
                <button id="submitBtn" class="btn btn-success" style="display: none;">Submit Quiz</button>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="resultScreen" class="screen">
        <div class="container">
            <div class="result-card">
                <div class="result-header">
                    <h1 class="result-title">🎉 Quiz Completed!</h1>
                </div>
                
                <div class="score-display">
                    <div class="score-circle">
                        <span id="percentageScore" class="percentage">0%</span>
                    </div>
                    <p class="score-label">Your Score</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card correct">
                        <div class="stat-icon">✓</div>
                        <div class="stat-info">
                            <span class="stat-value" id="correctCount">0</span>
                            <span class="stat-label">Correct</span>
                        </div>
                    </div>
                    
                    <div class="stat-card wrong">
                        <div class="stat-icon">✗</div>
                        <div class="stat-info">
                            <span class="stat-value" id="wrongCount">0</span>
                            <span class="stat-label">Wrong</span>
                        </div>
                    </div>
                    
                    <div class="stat-card total">
                        <div class="stat-icon">📊</div>
                        <div class="stat-info">
                            <span class="stat-value" id="totalQuestions">0</span>
                            <span class="stat-label">Total</span>
                        </div>
                    </div>
                </div>
                
                <div class="result-actions">
                    <button id="retryBtn" class="btn btn-primary">Retry Quiz</button>
                    <button id="homeBtn" class="btn btn-secondary">Go to Home</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
